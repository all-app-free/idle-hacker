<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Hacker v1.0 - Minimal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --primary-accent: #007bff;
            --light-gray: #f0f0f0;
            --border-color: #dddddd;
            --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--light-gray);
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary-accent);
        }

        .stats-panel {
            margin-bottom: 35px;
            background: var(--light-gray);
            padding: 20px;
            border-radius: 6px;
        }

        .stat-line {
            font-size: 1.1rem;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stat-line i {
            color: var(--primary-accent);
        }

        #hack-button {
            width: 100%;
            padding: 18px;
            background-color: var(--primary-accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-family: var(--font-sans);
            font-size: 1.4rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 35px;
            transition: background-color 0.2s, transform 0.1s;
        }

        #hack-button:hover {
            background-color: #0056b3;
        }

        #hack-button:active {
            transform: translateY(1px);
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: block;
            color: var(--primary-accent);
        }

        .upgrade-card {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
        }

        .upgrade-info {
            flex-grow: 1;
        }

        .upgrade-name {
            font-weight: 600;
            font-size: 1.05rem;
            display: block;
            margin-bottom: 4px;
        }
        .upgrade-name i {
            color: var(--primary-accent);
            margin-right: 5px;
        }

        .upgrade-desc {
            font-size: 0.9rem;
            color: #666666;
        }

        .buy-btn {
            background: var(--primary-accent);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-weight: 500;
            min-width: 110px;
            transition: background-color 0.2s;
            white-space: nowrap; /* Zabrání zalomení textu */
        }

        .buy-btn:disabled {
            background-color: #cccccc;
            color: #888888;
            cursor: not-allowed;
        }

        .buy-btn:not(:disabled):hover {
            background-color: #0056b3;
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .stats-panel {
                padding: 15px;
            }
            .stat-line {
                font-size: 1rem;
            }
            #hack-button {
                font-size: 1.2rem;
                padding: 15px;
            }
            .section-title {
                font-size: 1.1rem;
            }
            .upgrade-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .upgrade-info {
                margin-bottom: 10px;
            }
            .buy-btn {
                width: 100%;
                min-width: unset;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>IDLE HACKER v1.0</h1>
        </header>

        <section class="stats-panel">
            <div class="stat-line"><i class="fas fa-database"></i> Data Packets: <span id="dp-count">0</span></div>
            <div class="stat-line"><i class="fas fa-bolt"></i> Generation: <span id="dp-per-sec">0</span> DP/s</div>
            <div class="stat-line"><i class="fas fa-mouse-pointer"></i> Click Power: <span id="dp-per-click">1</span> DP</div>
        </section>

        <button id="hack-button">
            <i class="fas fa-laptop-code"></i> HACK SERVER
        </button>

        <span class="section-title">UPGRADES</span>
        
        <div id="upgrades-container">
            <div class="upgrade-card">
                <div class="upgrade-info">
                    <span class="upgrade-name"><i class="fas fa-robot"></i> Basic Botnet (<span id="count-botnet">0</span>)</span>
                    <span class="upgrade-desc">+1 DP/s per unit</span>
                </div>
                <button class="buy-btn" onclick="game.buyUpgrade('botnet')">Cost: <span id="cost-botnet">10</span></button>
            </div>

            <div class="upgrade-card">
                <div class="upgrade-info">
                    <span class="upgrade-name"><i class="fas fa-microchip"></i> Advanced AI (<span id="count-ai">0</span>)</span>
                    <span class="upgrade-desc">+10 DP per click</span>
                </div>
                <button class="buy-btn" onclick="game.buyUpgrade('ai')">Cost: <span id="cost-ai">50</span></button>
            </div>

            <div class="upgrade-card">
                <div class="upgrade-info">
                    <span class="upgrade-name"><i class="fas fa-shield-alt"></i> Encryption Module (<span id="count-enc">0</span>)</span>
                    <span class="upgrade-desc">+10% total DP/s</span>
                </div>
                <button class="buy-btn" onclick="game.buyUpgrade('encryption')">Cost: <span id="cost-encryption">100</span></button>
            </div>
        </div>
    </div>

    <script>
        const game = {
            dataPackets: 0,
            
            upgrades: {
                botnet: { count: 0, baseCost: 10, costMult: 1.15 },
                ai: { count: 0, baseCost: 50, costMult: 1.3 },
                encryption: { count: 0, baseCost: 100, costMult: 1.5 }
            },

            init() {
                try {
                    this.load();
                } catch (e) {
                    console.error("Chyba při načítání uložených dat:", e);
                    // Při chybě načítání vyčistí LocalStorage a začne znovu
                    localStorage.clear();
                    alert("Chyba při načítání hry. Progress byl resetován.");
                }
                
                const hackButton = document.getElementById('hack-button');
                if (hackButton) {
                    hackButton.addEventListener('click', () => {
                        this.dataPackets += this.getClickValue();
                        this.updateUI();
                    });
                } else {
                    console.error("Tlačítko 'Hack Server' nebylo nalezeno!");
                }

                setInterval(() => {
                    const gain = this.getDpsValue() / 10;
                    this.dataPackets += gain;
                    this.updateUI();
                }, 100);

                setInterval(() => this.save(), 10000);
                window.addEventListener('beforeunload', () => this.save());

                this.updateUI(); // Počáteční aktualizace UI
            },

            getClickValue() {
                return 1 + (this.upgrades.ai.count * 10);
            },

            getDpsValue() {
                let baseDps = this.upgrades.botnet.count * 1;
                let multiplier = 1 + (this.upgrades.encryption.count * 0.10);
                return baseDps * multiplier;
            },

            getCost(type) {
                const upg = this.upgrades[type];
                return Math.floor(upg.baseCost * Math.pow(upg.costMult, upg.count));
            },

            buyUpgrade(type) {
                const cost = this.getCost(type);
                if (this.dataPackets >= cost) {
                    this.dataPackets -= cost;
                    this.upgrades[type].count++;
                    this.updateUI();
                    this.save(); // Uložit po každém nákupu
                }
            },

            updateUI() {
                // Kontrola existence elementů před aktualizací
                const dpCountElem = document.getElementById('dp-count');
                if (dpCountElem) dpCountElem.innerText = Math.floor(this.dataPackets).toLocaleString('cs-CZ');

                const dpPerSecElem = document.getElementById('dp-per-sec');
                if (dpPerSecElem) dpPerSecElem.innerText = this.getDpsValue().toFixed(1).toLocaleString('cs-CZ');

                const dpPerClickElem = document.getElementById('dp-per-click');
                if (dpPerClickElem) dpPerClickElem.innerText = this.getClickValue().toLocaleString('cs-CZ');

                for (let key in this.upgrades) {
                    const cost = this.getCost(key);
                    const costElem = document.getElementById(`cost-${key}`);
                    const countElem = document.getElementById(`count-${key}`);
                    
                    if (costElem) costElem.innerText = cost.toLocaleString('cs-CZ');
                    if (countElem) countElem.innerText = this.upgrades[key].count;
                    
                    const btn = document.querySelector(`button[onclick*="buyUpgrade('${key}')"]`);
                    if (btn) btn.disabled = (this.dataPackets < cost);
                }
            },

            save() {
                try {
                    const saveData = {
                        dp: this.dataPackets,
                        upgrades: this.upgrades
                    };
                    localStorage.setItem('idleHackerSave', JSON.stringify(saveData));
                    console.log("Systém: Postup uložen.");
                } catch (e) {
                    console.error("Chyba při ukládání do LocalStorage:", e);
                }
            },

            load() {
                const saved = localStorage.getItem('idleHackerSave');
                if (saved) {
                    const data = JSON.parse(saved);
                    this.dataPackets = data.dp || 0;
                    if (data.upgrades) {
                        // Použít Object.assign pro sloučení, aby se neztratily existující vlastnosti upgrades
                        Object.assign(this.upgrades, data.upgrades);
                    }
                    console.log("Systém: Postup načten.");
                }
            }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
