<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Hacker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff;
            --accent: #2563eb;
            --text: #1f2937;
            --gray-100: #f3f4f6;
            --gray-300: #d1d5db;
            --font: 'Segoe UI', system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            justify-content: center;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 { font-weight: 800; letter-spacing: -1px; color: var(--accent); }

        .stats {
            background: var(--gray-100);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .stat-val { font-weight: 700; font-size: 1.2rem; }

        #hack-btn {
            width: 100%;
            padding: 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 2rem;
            transition: transform 0.1s;
        }

        #hack-btn:active { transform: scale(0.98); }

        .upgrade-list { display: flex; flex-direction: column; gap: 10px; }

        .upgrade-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border: 1px solid var(--gray-300);
            border-radius: 10px;
            transition: opacity 0.3s;
        }

        .upgrade-card.hidden { display: none; }

        .upg-info span { display: block; }
        .upg-name { font-weight: 600; font-size: 0.95rem; }
        .upg-desc { font-size: 0.75rem; color: #6b7280; }

        .buy-btn {
            padding: 8px 16px;
            background: var(--gray-100);
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .buy-btn:not(:disabled):hover { background: var(--accent); color: white; border-color: var(--accent); }
        .buy-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        footer { margin-top: 2rem; text-align: center; font-size: 0.7rem; color: var(--gray-300); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CORE_HACKER</h1>
    </header>

    <div class="stats">
        <div>Packets: <span id="dp-count" class="stat-val">0</span></div>
        <div style="font-size: 0.9rem; opacity: 0.7;">
            Per second: <span id="dp-ps">0</span> | Per click: <span id="dp-pc">1</span>
        </div>
    </div>

    <button id="hack-btn">SEND PACKET</button>

    <h3 style="margin-bottom: 1rem;">Available Upgrades</h3>
    <div id="upgrade-area" class="upgrade-list">
        </div>

    <footer>Progress autosaves to local storage.</footer>
</div>

<script>
const game = {
    dp: 0,
    upgradesOwned: {}, // ID: count

    // Definice 30 upgradů (15 pro botnet, 15 pro AI)
    catalog: [],

    init() {
        this.generateCatalog();
        this.load();
        this.renderUpgrades();
        
        document.getElementById('hack-btn').onclick = () => {
            this.dp += this.getClickPower();
            this.updateUI();
        };

        setInterval(() => {
            this.dp += (this.getDps() / 10);
            this.updateUI();
        }, 100);

        setInterval(() => this.save(), 10000);
        this.updateUI();
    },

    generateCatalog() {
        const nouns = ["Node", "Script", "Daemon", "Proxy", "Server", "Array", "Cloud", "Grid", "Matrix", "Core", "Nexus", "Void", "Engine", "Hive", "Titan"];
        
        // 15 Botnetů (Generují DP/s)
        for(let i=1; i<=15; i++) {
            this.catalog.push({
                id: 'b' + i,
                name: nouns[i-1] + " Botnet",
                desc: `Passive income +${Math.pow(2, i)} DP/s`,
                baseCost: Math.pow(10, i) * 0.5,
                power: Math.pow(2, i),
                type: 'dps'
            });
        }
        // 15 AI Modulů (Zvyšují klik)
        for(let i=1; i<=15; i++) {
            this.catalog.push({
                id: 'a' + i,
                name: nouns[i-1] + " AI",
                desc: `Click power +${Math.pow(3, i)} DP`,
                baseCost: Math.pow(10, i) * 0.8,
                power: Math.pow(3, i),
                type: 'click'
            });
        }
        // Seřadit podle ceny
        this.catalog.sort((a, b) => a.baseCost - b.baseCost);
    },

    getClickPower() {
        let p = 1;
        this.catalog.filter(u => u.type === 'click').forEach(u => {
            p += (this.upgradesOwned[u.id] || 0) * u.power;
        });
        return p;
    },

    getDps() {
        let s = 0;
        this.catalog.filter(u => u.type === 'dps').forEach(u => {
            s += (this.upgradesOwned[u.id] || 0) * u.power;
        });
        return s;
    },

    getCurrentCost(u) {
        const count = this.upgradesOwned[u.id] || 0;
        return Math.floor(u.baseCost * Math.pow(1.2, count));
    },

    buy(id) {
        const u = this.catalog.find(x => x.id === id);
        const cost = this.getCurrentCost(u);
        if (this.dp >= cost) {
            this.dp -= cost;
            this.upgradesOwned[id] = (this.upgradesOwned[id] || 0) + 1;
            this.updateUI();
            this.save();
        }
    },

    renderUpgrades() {
        const container = document.getElementById('upgrade-area');
        container.innerHTML = '';
        this.catalog.forEach(u => {
            const card = document.createElement('div');
            card.className = 'upgrade-card hidden';
            card.id = `card-${u.id}`;
            card.innerHTML = `
                <div class="upg-info">
                    <span class="upg-name">${u.name}</span>
                    <span class="upg-desc">${u.desc}</span>
                </div>
                <button class="buy-btn" id="btn-${u.id}" onclick="game.buy('${u.id}')">
                    ${this.getCurrentCost(u).toLocaleString()} DP
                </button>
            `;
            container.appendChild(card);
        });
    },

    updateUI() {
        document.getElementById('dp-count').innerText = Math.floor(this.dp).toLocaleString();
        document.getElementById('dp-ps').innerText = this.getDps().toLocaleString();
        document.getElementById('dp-pc').innerText = this.getClickPower().toLocaleString();

        this.catalog.forEach(u => {
            const cost = this.getCurrentCost(u);
            const btn = document.getElementById(`btn-${u.id}`);
            const card = document.getElementById(`card-${u.id}`);
            
            if (btn) {
                btn.innerText = cost.toLocaleString() + " DP";
                btn.disabled = this.dp < cost;
            }

            // Odemknout kartu, pokud na ni hráč skoro má (vypadá to lépe)
            if (this.dp >= cost * 0.7 || (this.upgradesOwned[u.id] > 0)) {
                card.classList.remove('hidden');
            }
        });
    },

    save() {
        localStorage.setItem('hacker_save_v2', JSON.stringify({
            dp: this.dp,
            owned: this.upgradesOwned
        }));
    },

    load() {
        const data = JSON.parse(localStorage.getItem('hacker_save_v2'));
        if (data) {
            this.dp = data.dp || 0;
            this.upgradesOwned = data.owned || {};
        }
    }
};

window.onload = () => game.init();
</script>

</body>
</html>
